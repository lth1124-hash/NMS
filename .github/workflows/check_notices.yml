name: Check Notices

on:
  # 원인 조사 중이라 스케줄은 잠시 꺼둠 (반복 실패 메일 방지). 원인 파악되면 아래
  # schedule 블록의 주석을 다시 풀 것.
  # schedule:
  #   # cron은 UTC 기준. KST(UTC+9) 09:00 = UTC 00:00, KST 18:00 = UTC 09:00
  #   - cron: "0 0 * * *"
  #   - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write # data/seen_state.json 자동 커밋을 위해 필요

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run NMS
        working-directory: src
        env:
          # ntfy.sh: NTFY_TOPIC만 등록하면 됨 (가입 불필요, 추천)
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          # 이메일(SMTP)도 같이/대신 쓰고 싶으면 아래도 등록 (선택)
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: python main.py

      - name: Commit updated state
        run: |
          git config user.name "nms-bot"
          git config user.email "nms-bot@users.noreply.github.com"
          git add data/seen_state.json
          git diff --cached --quiet || git commit -m "chore: update seen_state.json [skip ci]"
          git push
